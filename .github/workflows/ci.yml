name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality: 
    name: code quality
    runs-on: ubuntu-latest

    steps: 
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4 
        with: 
          node-version: "20"
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: lint 
        run: npm run lint

  build-and-test: 
    name: build and test
    runs-on: ubuntu-latest

    steps: 
      - name: checkout
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4 
        with: 
          node-version: "20"
          cache: npm

      - name: install dependencies
        run: npm ci

      - name: compile 
        run: npm run build
        
      
